name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup environment
        uses: actions/checkout@v7
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test
